<div id="reverse-ip-tool">
  <h2>Reverse IP Lookup - farukguler.com</h2>
  <input type="text" id="ipAddress" placeholder="IP adress or DNS">
  <button onclick="reverseIPLookup()">Sorgula</button>
  <pre id="output"></pre>
</div>

<script>
  function reverseIPLookup() {
    const ip = document.getElementById('ipAddress').value;
    const output = document.getElementById('output');

    if (!ip) {
      output.textContent = "IP adress or DNS";
      return;
    }

    // Backend proxy URL
    const proxyUrl = 'https://your-backend-proxy.com/reverseip';
    
    // Send the IP address to your backend server
    fetch(`${proxyUrl}?host=${ip}`)
      .then(response => response.json())
      .then(data => {
        // Format the response as needed
        if (data && data.results) {
          output.textContent = JSON.stringify(data.results, null, 2); // Show formatted JSON
        } else {
          output.textContent = "Sonuç bulunamadı.";
        }
      })
      .catch(error => {
        output.textContent = "Bir hata oluştu: " + error;
      });
  }
</script>
