<div id="reverse-ip-tool">
  <h2>Reverse IP Lookup - farukguler.com</h2>
  <input type="text" id="ipAddress" placeholder="IP adresi veya DNS girin">
  <button onclick="reverseIPLookup()">Sorgula</button>
  <pre id="output"></pre>
</div>

<script>
  function reverseIPLookup() {
    const ip = document.getElementById('ipAddress').value.trim();
    const output = document.getElementById('output');

    if (!ip) {
      output.textContent = "Lütfen bir IP adresi veya DNS girin.";
      return;
    }

    // viewdns.info API'sini kullan
    const api = 'https://viewdns.info/reverseip/?host=' + encodeURIComponent(ip) + '&t=1';

    fetch(api)
      .then(response => {
        if (!response.ok) {
          throw new Error('API isteği başarısız oldu: ' + response.statusText);
        }
        return response.text(); // HTML formatında yanıt alınır
      })
      .then(data => {
        // API yanıtını işle ve kullanıcıya göster
        output.textContent = data || "Sonuç bulunamadı.";
      })
      .catch(error => {
        output.textContent = "Bir hata oluştu: " + error.message;
      });
  }
</script>
