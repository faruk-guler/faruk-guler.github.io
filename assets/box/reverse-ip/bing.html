<div id="reverse-ip-tool">
  <h2>Reverse IP Lookup - Bing</h2>
  <input type="text" id="ipAddress" placeholder="IP adresi">
  <button onclick="reverseIPLookup()">Sorgula</button>
  <pre id="output"></pre>
</div>

<script>
  async function reverseIPLookup() {
    const ip = document.getElementById('ipAddress').value;
    const output = document.getElementById('output');

    if (!ip) {
      output.textContent = "Lütfen bir IP adresi girin.";
      return;
    }

    try {
      // Bing arama sorgusu
      const query = `ip:${ip}`;
      const response = await fetch(`https://www.bing.com/search?q=${encodeURIComponent(query)}`);
      
      if (!response.ok) {
        throw new Error("Bing'den yanıt alınamadı.");
      }

      const html = await response.text();
      output.textContent = "Sonuçlar:\n" + html; // Bing sonuçlarını burada işleyebilirsiniz
    } catch (error) {
      output.textContent = "Bir hata oluştu: " + error.message;
    }
  }
</script>
