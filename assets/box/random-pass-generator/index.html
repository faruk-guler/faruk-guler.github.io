<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Pass Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
            background-color: #1e1e1e;
            color: white;
        }
        .container {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background: #333;
            border-radius: 10px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .strength {
            height: 5px;
            background: red;
            width: 0%;
            margin-top: 10px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Random Pass Generator 🔒faruk-guler</h2>
        <input type="text" id="password" readonly>
        <button onclick="generatePassword()">Yeni Parola Üret</button>
        <button onclick="copyPassword()">Kopyala</button>
        <div class="strength" id="strength"></div>
        <label>Uzunluk: <span id="lengthValue">12</span></label>
        <input type="range" id="length" min="3" max="100" value="12" oninput="updateLength()">
    </div>

    <script>
        function generatePassword() {
            const length = document.getElementById('length').value;
            const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()";
            let password = "";
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('password').value = password;
            evaluateStrength(password);
        }

        function copyPassword() {
            const passwordField = document.getElementById('password');
            passwordField.select();
            document.execCommand("copy");
            alert("Parola kopyalandı!");
        }

        function evaluateStrength(password) {
            let strength = 0;
            if (password.length >= 12) strength += 1;
            if (/[A-Z]/.test(password)) strength += 1;
            if (/[0-9]/.test(password)) strength += 1;
            if (/[^A-Za-z0-9]/.test(password)) strength += 1;

            const strengthBar = document.getElementById('strength');
            const width = (strength / 4) * 100;
            strengthBar.style.width = width + "%";
            strengthBar.style.background = width > 75 ? "green" : width > 50 ? "orange" : "red";
        }

        function updateLength() {
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
        }
    </script>
</body>
</html>
