<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarayıcı ve IP Bilgileri</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 450px;
            width: 100%;
        }
        h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        button {
            padding: 10px 15px;
            font-size: 1em;
            cursor: pointer;
            border: none;
            background-color: #007BFF;
            color: white;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        pre {
            text-align: left;
            background: #f8f8f8;
            padding: 10px;
            border-radius: 5px;
            font-size: 1em;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Tarayıcı ve IP Bilgileri</h2>
    <button onclick="getBrowserInfo()">Bilgilerimi Göster</button>
    <pre id="infoOutput">Bilgileriniz burada görünecek...</pre>
</div>

<script>
function getBrowserInfo() {
    const output = document.getElementById('infoOutput');
    output.textContent = "Bilgiler yükleniyor...";

    // Tarayıcı bilgilerini al
    const userAgent = navigator.userAgent;
    const platform = navigator.platform;
    const language = navigator.language;
    const screenSize = `${screen.width}x${screen.height}`;

    // IP Adresini al
    fetch('https://api64.ipify.org?format=json')
        .then(response => response.json())
        .then(ipData => {
            const ip = ipData.ip;

            // IP'den konum bilgilerini al
            return fetch(`https://ipapi.co/${ip}/json/`);
        })
        .then(response => response.json())
        .then(locationData => {
            const ip = locationData.ip || "Bilinmiyor";
            const city = locationData.city || "Bilinmiyor";
            const region = locationData.region || "Bilinmiyor";
            const country = locationData.country_name || "Bilinmiyor";
            const isp = locationData.org || "Bilinmiyor";

            output.textContent = 
                `IP Adresiniz: ${ip}\n` +
                `Şehir: ${city}\n` +
                `Bölge: ${region}\n` +
                `Ülke: ${country}\n` +
                `ISP: ${isp}\n` +
                `İşletim Sistemi: ${platform}\n` +
                `Tarayıcı Bilgisi: ${userAgent}\n` +
                `Dil: ${language}\n` +
                `Ekran Çözünürlüğü: ${screenSize}`;
        })
        .catch(error => {
            console.error('Bilgiler alınamadı:', error);
            output.textContent = "Bilgiler alınamadı.";
        });
}
</script>

</body>
</html>
