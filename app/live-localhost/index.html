<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Localhosting Tool</title>
  <style>
    :root {
      --bg-color: #1e1e1e;
      --text-color: #d4d4d4;
      --border-color: #3c3c3c;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f5f5f5;
    }

    #editor-container, #output-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-width: 320px;
    }

    #editor {
      width: 100%;
      flex: 1;
      box-sizing: border-box;
      padding: 15px;
      font-family: 'Consolas', 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.5;
      border: none;
      border-right: 1px solid var(--border-color);
      resize: none;
      background-color: var(--bg-color);
      color: var(--text-color);
      outline: none;
    }

    #output {
      flex: 1;
      border: none;
      background-color: #ffffff;
    }

    /* Stack vertically on smaller screens */
    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      #editor {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
    }
  </style>
</head>
<body>

  <div id="editor-container">
    <textarea id="editor" placeholder="Type your HTML, CSS, or JS code here..." spellcheck="false"></textarea>
  </div>
  
  <div id="output-container">
    <iframe id="output" sandbox="allow-scripts"></iframe>
  </div>

  <script>
    const editor = document.getElementById('editor');
    const output = document.getElementById('output');
    let timeoutId;

    // Main function to update the preview
    function updateOutput() {
      const htmlContent = editor.value;
      output.srcdoc = htmlContent;
    }

    // Debounce function: Waits for 300ms after the user stops typing to boost performance
    function handleInput() {
      clearTimeout(timeoutId);
      timeoutId = setTimeout(updateOutput, 300);
    }

    // Event Listener
    editor.addEventListener('input', handleInput);

    // Initial English starter template
    editor.value = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { font-family: sans-serif; text-align: center; padding-top: 50px; color: #333; }
    h1 { color: #007acc; }
    button { padding: 10px 20px; background: #007acc; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
    button:hover { background: #005999; }
  </style>
</head>
<body>
  <h1>Hello World!</h1>
  <p>Your live HTML/CSS preview tool is working flawlessly.</p>
  <button onclick="alert('JavaScript works perfectly too!')">Click Me -farukguler.com</button>
</body>
</html>`;

    // Render the initial template on load
    updateOutput();
  </script>
</body>
</html>
