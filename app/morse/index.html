<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morse Code Converter | farukguler.com</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="header-top">
        <div class="signal-bar">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="lang-selector">
          <button class="lang-btn active" id="langTr" onclick="changeLang('tr')">TR</button>
          <button class="lang-btn" id="langEn" onclick="changeLang('en')">EN</button>
        </div>
      </div>
      <h1 id="appTitle">MOR<span>SE</span> KODU</h1>
      <p id="appSubtitle">Metin → Mors Kodu Dönüştürücü</p>
    </header>

    <div class="panels">
      <div class="panel">
        <div class="panel-label" id="textInputLabel"><div class="dot-indicator"></div> Metin Girişi</div>
        <textarea id="textInput" aria-label="Input area for text or morse code" placeholder="Mesajınızı buraya yazın..." spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="panel">
        <div class="panel-label" id="morseOutputLabel"><div class="dot-indicator"></div> Mors Çıktısı</div>
        <div id="morseOutput">—</div>
      </div>
    </div>

    <!-- Ayarlar Kontrol Paneli -->
    <div class="settings-panel">
      <div class="setting-item">
        <span class="setting-label" id="lblWpm">Hız (WPM): 15</span>
        <input type="range" id="wpmSlider" min="5" max="40" value="15" oninput="updateWpm(this.value)">
      </div>
      <div class="setting-item">
        <span class="setting-label" id="lblFreq">Ton (Hz): 700</span>
        <input type="range" id="freqSlider" min="400" max="1000" step="50" value="700" oninput="updateFreq(this.value)">
      </div>
      <div class="setting-item checkbox-item" id="normalizeContainer">
        <label class="checkbox-container">
          <input type="checkbox" id="normalizeCheck" onchange="toggleNormalize(this.checked)">
          <span class="checkmark"></span>
          <span id="lblNormalize">Türkçe karakterleri dönüştür (Ç->C, Ş->S vb.)</span>
        </label>
      </div>
    </div>

    <!-- Sanal Morse Klavyesi -->
    <div class="mors-keyboard" id="morsKeyboard" style="display: none;">
      <button class="k-btn" onclick="insertMorse('.')">·</button>
      <button class="k-btn" onclick="insertMorse('-')">—</button>
      <button class="k-btn wide" id="kBtnSpace" onclick="insertMorse(' ')">Boşluk (Karakter Arası)</button>
      <button class="k-btn wide" id="kBtnWord" onclick="insertMorse(' / ')">/ (Kelime Arası)</button>
      <button class="k-btn danger-btn" onclick="backspaceMorse()">⌫</button>
    </div>

    <div class="toolbar">
      <button class="btn primary" id="copyBtn" onclick="copyMorse()"><span class="btn-icon">⊕</span> Mors Kopyala</button>
      <button class="btn play-btn" id="playBtn" onclick="playMorse()"><span class="btn-icon">▶</span> Dinle</button>
      <button class="btn" id="swapBtn" onclick="swapMode()"><span class="btn-icon">⇄</span> Değiştir</button>
      <div class="spacer"></div>
      <button class="btn danger" id="clearBtn" onclick="clearAll()">✕ Temizle</button>
    </div>

    <div class="stats">
      <div class="stat-item"><span id="lblStatChar">Karakter</span>: <span id="charCount">0</span></div>
      <div class="stat-item"><span id="lblStatWord">Kelime</span>: <span id="wordCount">0</span></div>
      <div class="stat-item"><span id="lblStatSymbols">Mors Sembolü</span>: <span id="symbolCount">0</span></div>
      <div class="stat-item"><span id="lblStatTime">Sinyal Süresi</span>: <span id="signalTime">0s</span></div>
    </div>

    <div class="visual-morse">
      <div class="visual-morse-label" id="visualLabel">⬡ Görsel Sinyal Gösterimi</div>
      <div class="morse-visual-track" id="visualTrack"></div>
    </div>

    <div class="reference-toggle">
      <div class="ref-header" id="refHeader" onclick="toggleRef()">
        <span id="refTitle">⊞ Mors Kodu Referans Tablosu</span>
        <span class="chevron">▼</span>
      </div>
      <div class="ref-body" id="refBody">
        <div class="ref-grid" id="refGrid"></div>
      </div>
    </div>

    <footer>
      <p>Made for <a href="https://farukguler.com" target="_blank">farukguler.com</a> · International Morse Code</p>
    </footer>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/dictionary.js"></script>
  <script src="js/translator.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
