<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHOIS Domain Lookup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input[type="text"] {
            width: calc(100% - 22px);
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #99c2ff;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f1f1f1;
            white-space: pre-wrap;
            font-family: monospace;
            display: none;
        }
        .error {
            color: red;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>WHOIS Domain Lookup</h1>
    <input type="text" id="domainInput" placeholder="Alan adını girin (örnek: farukguler.com)">
    <button id="lookupBtn" onclick="whoisLookup()">Sorgula</button>
    <div class="result" id="result"></div>
    <div class="error" id="error"></div>
</div>

<script>
    // basit alan adı format kontrolü
    const domainPattern = /^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$/;

    function formatDate(unixSeconds) {
        if (!unixSeconds || isNaN(unixSeconds)) return "Bilinmiyor";
        const d = new Date(unixSeconds * 1000);
        if (isNaN(d.getTime())) return "Bilinmiyor";
        return d.toLocaleDateString('tr-TR');
    }

    async function whoisLookup() {
        const input = document.getElementById('domainInput');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const btn = document.getElementById('lookupBtn');
        const domain = input.value.trim().toLowerCase().replace(/^https?:\/\//, '').replace(/\/.*$/, '');

        resultDiv.style.display = "none";
        errorDiv.textContent = "";

        if (!domain) {
            errorDiv.textContent = "Lütfen bir alan adı girin.";
            return;
        }

        if (!domainPattern.test(domain)) {
            errorDiv.textContent = "Geçersiz alan adı formatı (örnek: farukguler.com).";
            return;
        }

        btn.disabled = true;
        btn.textContent = "Sorgulanıyor...";

        // 10 saniyelik zaman aşımı, donmuş isteği engellemek için
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        try {
            const response = await fetch(`https://api.whois.vu/?q=${encodeURIComponent(domain)}`, {
                signal: controller.signal
            });
            clearTimeout(timeoutId);

            if (!response.ok) {
                throw new Error(`Sunucu hatası (HTTP ${response.status})`);
            }

            const data = await response.json();

            if (data.available === "yes") {
                resultDiv.textContent = `Alan adı: ${domain}\nDurum: Kayıtlı değil (Müsait)`;
            } else if (data.available === "no" || data.registrar || data.whois) {
                resultDiv.textContent =
`Alan adı: ${domain}
Durum: Kayıtlı
Kayıt Şirketi: ${data.registrar || "Bilinmiyor"}
Oluşturulma Tarihi: ${formatDate(data.created)}
Son Güncelleme Tarihi: ${formatDate(data.updated)}
Expire Tarihi: ${formatDate(data.expires)}

WHOIS Verileri:
${data.whois || "Detay bulunamadı."}`;
            } else {
                resultDiv.textContent = "Sonuç anlaşılamadı, ham veri:\n" + JSON.stringify(data, null, 2);
            }

            resultDiv.style.display = "block";
        } catch (error) {
            if (error.name === "AbortError") {
                errorDiv.textContent = "İstek zaman aşımına uğradı. Lütfen tekrar deneyin.";
            } else {
                errorDiv.textContent = "WHOIS sorgusu sırasında bir hata oluştu: " + error.message;
            }
            console.error("WHOIS sorgu hatası:", error);
        } finally {
            clearTimeout(timeoutId);
            btn.disabled = false;
            btn.textContent = "Sorgula";
        }
    }

    document.getElementById('domainInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter') whoisLookup();
    });
</script>

</body>
</html>
