<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rise & Potential MC Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.7);
            --border-color: rgba(48, 54, 61, 0.8);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-color: #58a6ff;
            --accent-hover: #3182ce;
            --accent-glow: rgba(88, 166, 255, 0.3);
            --success: #2ea043;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(209, 213, 219, 0.8);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --accent-color: #2563eb;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(88, 166, 255, 0.05), transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 80px 20px 40px;
            margin: 0;
            transition: var(--transition);
        }

        .unified-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1001;
        }

        .back-btn {
            padding: 10px 20px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            color: var(--accent-color);
            text-decoration: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .back-btn:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.8s ease;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 2.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6rem;
            margin-bottom: 2rem;
            position: relative;
        }

        @media (max-width: 992px) {
            .grid {
                gap: 3rem;
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }

        .swap-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            /* Allow interaction with button but ignore container */
        }

        /* Vertical divider line */
        .swap-container::before {
            content: '';
            position: absolute;
            height: 250px;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--border-color), transparent);
            z-index: -1;
        }

        .swap-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            padding: 0;
            pointer-events: auto;
        }

        .swap-btn:hover {
            background: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: scale(1.1) rotate(180deg);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        @media (max-width: 768px) {
            .swap-container {
                position: relative;
                left: auto;
                top: auto;
                transform: none;
                margin: 10px 0;
            }

            .swap-container::before {
                height: 1px;
                width: 80%;
                background: linear-gradient(to right, transparent, var(--border-color), transparent);
            }

            .swap-btn {
                transform: rotate(90deg);
            }

            .swap-btn:hover {
                transform: scale(1.1) rotate(270deg);
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.02);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            width: 100%;
            position: relative;
        }

        .card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.1);
        }

        .card-header {
            color: var(--text-primary);
            font-weight: 700;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .badge {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--accent-color);
            color: white;
            text-transform: uppercase;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        input,
        select {
            background: #111111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        body.light-mode input,
        body.light-mode select {
            background: #f9fafb;
            border-color: #d1d5db;
        }

        input {
            flex: 2;
        }

        select {
            flex: 1.2;
            cursor: pointer;
        }

        input:focus,
        select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .mc-preview {
            font-size: 0.8rem;
            text-align: right;
            color: var(--success);
            margin-top: 6px;
            font-weight: 600;
            min-height: 1.2em;
        }

        .result-area {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.1) 0%, rgba(13, 17, 23, 0.8) 100%);
            margin-top: 2rem;
            padding: 2.5rem;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--accent-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .result-title {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 1rem;
        }

        .result-price {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin: 0;
            line-height: 1.1;
            text-shadow: 0 0 30px var(--accent-glow);
        }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: block;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .stat-val {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            padding: 14px 40px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .result-price {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="unified-header">
        <a href="../../index.html" class="back-btn"><i class="fa-solid fa-house"></i> Home</a>
    </div>

    <div class="container">
        <h1><i class="fa-solid fa-chart-pie"></i> Price & Potential MC Calculator</h1>
        <div class="subtitle">Billion, trillion, quadrillion... Compatible with all coins.</div>

        <div style="position: relative; margin-bottom: 2rem;">
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <span class="badge">Source</span>
                    </div>

                    <div class="input-group">
                        <label>Asset Symbol</label>
                        <input type="text" id="sName" placeholder="e.g. PEPE, SUI...">
                    </div>

                    <div class="input-group">
                        <label>Current Price ($)</label>
                        <input type="number" id="sPrice" placeholder="e.g. 0.0000012" step="any">
                    </div>

                    <div class="input-group">
                        <label>Circulating Supply</label>
                        <div class="input-row">
                            <input type="number" id="sSupplyInput" placeholder="e.g. 420.69" step="any">
                            <select id="sUnit">
                                <option value="1000000000000000">Quadrillion</option>
                                <option value="1000000000000">Trillion</option>
                                <option value="1000000000">Billion</option>
                                <option value="1000000" selected>Million</option>
                                <option value="1">Unit (Full)</option>
                            </select>
                        </div>
                        <div id="sMC" class="mc-preview">Market Cap: $0</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <span class="badge" style="background:#2ea043;">Target</span>
                    </div>

                    <div class="input-group">
                        <label>Target Asset Symbol</label>
                        <input type="text" id="tName" placeholder="e.g. Solana, ETH...">
                    </div>

                    <div class="input-group">
                        <label>Competitor Price ($)</label>
                        <input type="number" id="tPrice" placeholder="e.g. 135" step="any">
                    </div>

                    <div class="input-group">
                        <label>Competitor Supply</label>
                        <div class="input-row">
                            <input type="number" id="tSupplyInput" placeholder="e.g. 562" step="any">
                            <select id="tUnit">
                                <option value="1000000000000000">Quadrillion</option>
                                <option value="1000000000000">Trillion</option>
                                <option value="1000000000">Billion</option>
                                <option value="1000000" selected>Million</option>
                                <option value="1">Unit (Full)</option>
                            </select>
                        </div>
                        <div id="tMC" class="mc-preview">Target Market Cap: $0</div>
                    </div>
                </div>
            </div>

            <div class="swap-container">
                <button class="swap-btn" onclick="swapAssets()" title="Swap Source and Target">
                    <i class="fa-solid fa-right-left"></i>
                </button>
            </div>
        </div>

        <div class="btn-group">
            <button class="calc-btn" onclick="calculate()"><i class="fa-solid fa-calculator"></i> CALCULATE</button>
            <button class="clear-btn" onclick="clearForm()"><i class="fa-solid fa-rotate-left"></i> CLEAR</button>
        </div>

        <div class="result-area" id="resultArea">
            <div class="result-title">
                If <span id="resName" style="color: var(--text-primary); font-weight: bold;">---</span>
                reaches the Market Cap of <span id="resTargetName">---</span>:
            </div>

            <div class="result-price" id="resPrice">--- $</div>

            <div class="result-stats">
                <div class="stat-box">
                    <span class="stat-label">Potential Growth (X)</span>
                    <span class="stat-val" id="resX">---</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Percentage Gain</span>
                    <span class="stat-val" id="resPercent">---</span>
                </div>
            </div>

            <div
                style="margin-top: 20px; font-size: 0.85rem; color: var(--text-secondary); border-top: 1px solid var(--border-color); padding-top: 10px;">
                Target Market Cap: <span id="resTargetMC" style="color: var(--text-primary)">---</span>
            </div>
        </div>
    </div>

    <script>
        const formatUSD = (num) => {
            if (typeof num !== 'number' || isNaN(num) || num < 0) return '$0';
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                notation: "compact",
                maximumFractionDigits: 2
            }).format(num);
        };

        const formatPrice = (num) => {
            if (typeof num !== 'number' || isNaN(num)) return '---';
            if (num === 0) return '$0.00';
            if (num < 0.01 && num > 0) {
                let str = num.toFixed(10).replace(/0+$/, '').replace(/\.$/, '');
                if (str.includes('.')) {
                    const [int, dec] = str.split('.');
                    return '$' + int + '.' + (dec.length > 8 ? dec.substring(0, 8) : dec);
                }
                return '$' + str;
            }
            return new Intl.NumberFormat('en-US', {
                style: 'currency',
                currency: 'USD',
                minimumFractionDigits: 2,
                maximumFractionDigits: 6
            }).format(num);
        };

        function calculate() {
            const sName = document.getElementById('sName').value || 'Asset';
            const tName = document.getElementById('tName').value || 'Competitor';

            const sPrice = parseFloat(document.getElementById('sPrice').value);
            const sInputVal = parseFloat(document.getElementById('sSupplyInput').value);
            const sMultiplier = parseFloat(document.getElementById('sUnit').value);
            const sSupply = sInputVal * sMultiplier;

            const tPrice = parseFloat(document.getElementById('tPrice').value);
            const tInputVal = parseFloat(document.getElementById('tSupplyInput').value);
            const tMultiplier = parseFloat(document.getElementById('tUnit').value);
            const tSupply = tInputVal * tMultiplier;

            if (
                isNaN(sPrice) || isNaN(sSupply) || isNaN(tPrice) || isNaN(tSupply) ||
                sPrice <= 0 || sSupply <= 0 || tPrice <= 0 || tSupply <= 0
            ) {
                document.getElementById('resultArea').style.display = 'none';
                document.getElementById('sMC').innerText = 'Market Cap: $0';
                document.getElementById('tMC').innerText = 'Target Market Cap: $0';
                return;
            }

            const sMC = sPrice * sSupply;
            const tMC = tPrice * tSupply;

            document.getElementById('sMC').innerText = `Market Cap: ${formatUSD(sMC)}`;
            document.getElementById('tMC').innerText = `Target Market Cap: ${formatUSD(tMC)}`;

            const targetPrice = tMC / sSupply;
            const multiplier = targetPrice / sPrice;
            const percent = (multiplier - 1) * 100;

            const resultArea = document.getElementById('resultArea');
            resultArea.style.display = 'block';
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            document.getElementById('resName').innerText = sName;
            document.getElementById('resTargetName').innerText = tName;
            document.getElementById('resPrice').innerText = formatPrice(targetPrice);
            document.getElementById('resX').innerText = multiplier.toFixed(2) + 'x';
            document.getElementById('resPercent').innerText = (percent >= 0 ? '+' : '') + percent.toLocaleString('en-US', { maximumFractionDigits: 0 }) + '%';
            document.getElementById('resTargetMC').innerText = formatUSD(tMC);
        }

        function clearForm() {
            document.getElementById('sName').value = '';
            document.getElementById('sPrice').value = '';
            document.getElementById('sSupplyInput').value = '';
            document.getElementById('tName').value = '';
            document.getElementById('tPrice').value = '';
            document.getElementById('tSupplyInput').value = '';
            document.getElementById('resultArea').style.display = 'none';
            document.getElementById('sMC').innerText = 'Market Cap: $0';
            document.getElementById('tMC').innerText = 'Target Market Cap: $0';
        }

        function swapAssets() {
            const IDs = ['Name', 'Price', 'SupplyInput', 'Unit'];

            IDs.forEach(id => {
                const sourceEl = document.getElementById('s' + id);
                const targetEl = document.getElementById('t' + id);

                const temp = sourceEl.value;
                sourceEl.value = targetEl.value;
                targetEl.value = temp;
            });

            calculate();
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('input', calculate);
        });

        function loadThemePreference() {
            const savedTheme = localStorage.getItem('whalestack-theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.remove('light-mode');
            }
        }

        loadThemePreference();
    </script>

</body>

</html>
