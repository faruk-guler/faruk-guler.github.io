<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Internet Speed Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Professional Internet Speed Test</h1>

  <div class="test-container">
    <div class="button-group">
      <button id="startTest">Start Full Test</button>
      <button id="downloadTest" class="secondary">Download Test Only</button>
      <button id="uploadTest" class="secondary">Upload Test Only</button>
      <button id="pingTest" class="secondary">Ping &amp; Jitter Test</button>
    </div>

    <select id="sizeSelect" class="server-select">
      <option value="10">Quick Test (10 MB)</option>
      <option value="25" selected>Standard Test (25 MB)</option>
      <option value="50">Extended Test (50 MB)</option>
    </select>
    <div class="note">Test server: Cloudflare global network (nearest point, automatic)</div>

    <div class="error-message" id="errorMessage"></div>
    <div class="success-message" id="successMessage"></div>
  </div>

  <div class="result-container">
    <div class="result-card">
      <div class="test-title">Download Speed</div>
      <div class="progress-container"><div class="progress-bar" id="downloadProgress"></div></div>
      <div class="result" id="downloadResult">
        <div class="speed-value" id="downloadSpeed">-</div><span class="unit">Mbps</span>
      </div>
    </div>

    <div class="result-card">
      <div class="test-title">Upload Speed</div>
      <div class="progress-container"><div class="progress-bar" id="uploadProgress"></div></div>
      <div class="result" id="uploadResult">
        <div class="speed-value" id="uploadSpeed">-</div><span class="unit">Mbps</span>
      </div>
    </div>

    <div class="result-card">
      <div class="test-title">Ping &amp; Jitter</div>
      <div class="ping-result" id="pingResult">-</div>
      <div class="ping-result" id="jitterResult">-</div>
    </div>
  </div>

  <div class="test-container history-container">
    <div class="history-title">Test History (this session)</div>
    <div id="historyList"><span class="history-empty">No tests run yet.</span></div>
    <button id="clearHistory" class="secondary" style="margin-top: 15px;">Clear History</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
