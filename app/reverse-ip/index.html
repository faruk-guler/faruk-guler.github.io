<div id="reverse-ip-tool">
  <h2>Reverse IP Lookup - farukguler.com</h2>
  <input type="text" id="ipAddress" placeholder="IP adresi veya alan adı girin">
  <button id="lookupBtn" onclick="reverseIPLookup()">Sorgula</button>
  <pre id="output"></pre>
</div>

<script>
  async function reverseIPLookup() {
    const input = document.getElementById('ipAddress');
    const output = document.getElementById('output');
    const btn = document.getElementById('lookupBtn');
    const ip = input.value.trim();

    if (!ip) {
      output.textContent = "Lütfen bir IP adresi veya alan adı girin.";
      return;
    }

    // basit format kontrolü (IPv4 veya domain)
    const ipv4Pattern = /^(\d{1,3}\.){3}\d{1,3}$/;
    const domainPattern = /^[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?(\.[a-zA-Z0-9]([a-zA-Z0-9-]{0,61}[a-zA-Z0-9])?)+$/;
    if (!ipv4Pattern.test(ip) && !domainPattern.test(ip)) {
      output.textContent = "Geçersiz IP adresi veya alan adı formatı.";
      return;
    }

    btn.disabled = true;
    output.textContent = "Sorgulanıyor...";

    // 10 saniyelik zaman aşımı (donmuş isteği engellemek için)
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);

    try {
      const response = await fetch(
        `https://api.hackertarget.com/reverseiplookup/?q=${encodeURIComponent(ip)}`,
        { signal: controller.signal }
      );
      clearTimeout(timeoutId);

      if (!response.ok) {
        if (response.status === 429) {
          output.textContent = "Günlük sorgu limitine ulaşıldı. Lütfen daha sonra tekrar deneyin.";
        } else {
          output.textContent = `Sunucu hatası (HTTP ${response.status}).`;
        }
        return;
      }

      const data = (await response.text()).trim();

      // hackertarget API limit/hata durumlarında da 200 dönebiliyor, metne bakmak gerekiyor
      if (!data) {
        output.textContent = "Sonuç bulunamadı.";
      } else if (/API count exceeded/i.test(data)) {
        output.textContent = "Günlük ücretsiz sorgu limiti doldu. Lütfen daha sonra tekrar deneyin.";
      } else if (/error/i.test(data)) {
        output.textContent = "Sorgu başarısız: " + data;
      } else {
        output.textContent = data;
      }
    } catch (error) {
      clearTimeout(timeoutId);
      if (error.name === "AbortError") {
        output.textContent = "İstek zaman aşımına uğradı. Lütfen tekrar deneyin.";
      } else {
        output.textContent = "Bir hata oluştu: " + error.message;
      }
    } finally {
      btn.disabled = false;
    }
  }

  document.getElementById('ipAddress').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') reverseIPLookup();
  });
</script>
