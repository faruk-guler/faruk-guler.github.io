<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IP and Browser Information Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(to bottom, #2196F3, #E3F2FD);
        }
        .container {
            text-align: center;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #1a237e;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #2196F3;
            color: #ffffff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #1976D2;
        }
        button:disabled {
            background-color: #90caf9;
            cursor: not-allowed;
        }
        pre {
            background-color: #f1f1f1;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
            text-align: left;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        a {
            display: inline-block;
            margin-top: 10px;
            color: #1a73e8;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>IP and Browser Information</h1>
        <button id="infoBtn" onclick="getBrowserInfo()">Show My Information</button>
        <pre id="infoOutput">Bilgilerinizi görmek için butona tıklayın...</pre>
        <div id="mapLinkContainer"></div>
    </div>

    <script>
        async function getBrowserInfo() {
            const output = document.getElementById('infoOutput');
            const btn = document.getElementById('infoBtn');
            const mapContainer = document.getElementById('mapLinkContainer');

            mapContainer.innerHTML = "";
            output.textContent = "Bilgiler yükleniyor...";
            btn.disabled = true;

            try {
                // Not: AbortController/signal bazı sandbox ortamlarında (postMessage
                // üzerinden fetch aktaran iframe'ler) "DataCloneError" verdiği için
                // timeout'u Promise.race ile, signal kullanmadan yapıyoruz.
                const response = await Promise.race([
                    fetch('https://ipapi.co/json/'),
                    new Promise((_, reject) =>
                        setTimeout(() => reject(new Error("TIMEOUT")), 10000)
                    )
                ]);

                if (!response.ok) {
                    if (response.status === 429) {
                        throw new Error("Günlük sorgu limitine ulaşıldı. Lütfen daha sonra tekrar deneyin.");
                    }
                    throw new Error(`API Hatası: ${response.status}`);
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.reason || "Sağlayıcı bir hata döndürdü.");
                }

                const userAgent = navigator.userAgent;
                const platform = navigator.platform || "Bilinmiyor";
                const language = navigator.language;
                const screenSize = `${screen.width}x${screen.height}`;

                const lines = [
                    `IP Adresiniz: ${data.ip || "Bilinmiyor"}`,
                    `İşletim Sistemi: ${platform}`,
                    `Tarayıcı Bilgisi: ${userAgent}`,
                    `Dil: ${language}`,
                    `Ekran Çözünürlüğü: ${screenSize}`,
                    `Şehir: ${data.city || 'Bilinmiyor'}`,
                    `Bölge: ${data.region || 'Bilinmiyor'}`,
                    `Ülke: ${data.country_name || 'Bilinmiyor'}`,
                    `ISP: ${data.org || 'Bilinmiyor'}`
                ];

                const hasCoords = typeof data.latitude === 'number' && typeof data.longitude === 'number';
                if (hasCoords) {
                    lines.push(`Koordinatlar: ${data.latitude}, ${data.longitude}`);
                }

                output.textContent = lines.join('\n');

                // Harita linkini güvenli şekilde (innerHTML kullanmadan) ekle
                if (hasCoords) {
                    const link = document.createElement('a');
                    link.href = `https://www.google.com/maps?q=${data.latitude},${data.longitude}`;
                    link.target = "_blank";
                    link.rel = "noopener noreferrer";
                    link.textContent = "Konumu Haritada Gör";
                    mapContainer.appendChild(link);
                }
            } catch (error) {
                if (error.message === "TIMEOUT") {
                    output.textContent = "İstek zaman aşımına uğradı. Lütfen tekrar deneyin.";
                } else {
                    output.textContent = "Bilgiler alınamadı: " + error.message;
                }
                console.error('Hata:', error);
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
