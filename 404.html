<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found!</title>
    <style>
        :root { --x: 50%; --y: 50%; } /* Başlangıç noktaları */
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden; /* Taşmayı gizler */
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Resmin orantılı görünmesi için */
            position: absolute; /* Resmi arka plana almak için */
            top: 0;
            left: 0;
            z-index: -1; /* Resmin arka planda görünmesi için */
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--x) var(--y), rgba(10, 0, 10, 0.0), rgba(0, 0, 0, 10)); /* Daha karanlık gölge efekti */
            z-index: 1; /* Gölge efektini ön plana alır */
        }
        h2 {
            color: white; /* Metin rengi */
            position: absolute; /* Metni ortalamak için */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* Merkeze yerleştirme */
            z-index: 2; /* Metni en üstte görünür kılmak için */
            text-align: center; /* Metni ortalar */
        }
    </style>
</head>
<body>
    <img src="https://raw.githubusercontent.com/faruk-guler/faruk-guler.github.io/refs/heads/main/assets/img/404.png" alt="404 Not Found">
    <div class="overlay"></div> <!-- Gölge efekti -->
    <h2>Kayboldun! Burada cırcır böceklerinden başka hiçbir şey yok :(</h2>
    <script>
        document.onmousemove = e => {
            // X ve Y koordinatlarını yüzde olarak ayarlama
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            document.documentElement.style.setProperty('--x', `${x}%`);
            document.documentElement.style.setProperty('--y', `${y}%`);
        };
    </script>
</body>
</html>


<meta name="viewport" content="width=device-width, initial-scale=1.0">
