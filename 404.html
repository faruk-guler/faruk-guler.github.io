<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found!</title>
    <style>
        :root { --x: 50%; --y: 50%; }
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--x) var(--y), rgba(10, 0, 10, 0.0), rgba(0, 0, 0, 10));
            z-index: 1;
        }
        h2 {
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
        }
    </style>
</head>
<body>
    <img src="https://faruk-guler.github.io/assets//img/404.png" alt="404 Not Found">
    <div class="overlay"></div>
    <h2>Kayboldun! Burada cırcır böceklerinden başka hiçbir şey yok :(</h2>

    <!-- Ses dosyasını ekleme -->

<audio controls autoplay>
        <source src="GFG.ogg" type="audio/ogg">
        <source src="https://faruk-guler.github.io/assets/voice/bug-night.mp3"
                type="audio/mpeg">
</audio>

    <script>
        document.onmousemove = e => {
            const x = e.clientX / window.innerWidth * 100;
            const y = e.clientY / window.innerHeight * 100;
            document.documentElement.style.setProperty('--x', `${x}%`);
            document.documentElement.style.setProperty('--y', `${y}%`);
        };
    </script>
</body>
</html>
