baseURL = "https://faruk-guler.github.io/"
languageCode = "en"
title = "Faruk Güler Blog"
theme = "hello-friend-ng"
[pagination]
  pagerSize = 10
defaultContentLanguage = "en"

[params]
# Global params for the theme
dateFormat = "2006-01-02"
showReadingTime = true

[languages]

  [languages.en]
  languageName = "English"
  weight = 1

    [languages.en.params]
    subtitle = "Thoughts, Notes & Tech"
    description = "Personal tech blog by Faruk Güler"
    keywords = ["Blog", "Tech", "Notes"]

  [languages.tr]
  languageName = "Türkçe"
  weight = 2

    [languages.tr.params]
    subtitle = "Düşünceler, Notlar ve Teknoloji"
    description = "Faruk Güler'in kişisel teknoloji blogu"
    keywords = ["Blog", "Teknoloji", "Notlar"]

[menu]

  [[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 1

  [[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 2

[module]
  [[module.imports]]
    path = "github.com/panr/hugo-theme-hello-friend-ng"
