<div id="whois-tool">
  <h2>WHOIS Sorgulama</h2>
  <input type="text" id="whoisInput" placeholder="Alan Adı Girin">
  <button onclick="lookupWHOIS()">Sorgula</button>
  <pre id="whoisOutput"></pre>
</div>

<script>
  async function lookupWHOIS() {
    let domain = document.getElementById('whoisInput').value.trim();
    if (!domain) {
      alert("Lütfen bir domain girin!");
      return;
    }

    let response = await fetch(`https://api.whois.vu/?q=${domain}`);
    let data = await response.json();

    document.getElementById('whoisOutput').innerText = JSON.stringify(data, null, 2);
  }
</script>
