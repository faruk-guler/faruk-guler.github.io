<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ağ Hız Testi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        .container {
            background-color: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 2px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #e9e9e9;
            border-radius: 5px;
        }
        .progress-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 5px;
            margin: 20px 0;
        }
        .progress-bar {
            height: 20px;
            background-color: #4CAF50;
            border-radius: 5px;
            width: 0%;
            transition: width 0.3s;
        }
        .speed-value {
            font-size: 24px;
            font-weight: bold;
            margin: 10px 0;
        }
        .unit {
            font-size: 16px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ağ Hız Testi</h1>
        <p>İnternet bağlantı hızınızı test etmek için başlat butonuna tıklayın.</p>
        
        <button id="startTest">Testi Başlat</button>
        
        <div class="progress-container" id="progressContainer" style="display: none;">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="result" id="downloadResult" style="display: none;">
            <h3>İndirme Hızı</h3>
            <div class="speed-value" id="downloadSpeed">0</div>
            <span class="unit">Mbps</span>
        </div>
        
        <div class="result" id="uploadResult" style="display: none;">
            <h3>Yükleme Hızı</h3>
            <div class="speed-value" id="uploadSpeed">0</div>
            <span class="unit">Mbps</span>
        </div>
    </div>

    <script>
        document.getElementById('startTest').addEventListener('click', startTest);
        
        let testInProgress = false;
        const testDataSize = 10 * 1024 * 1024; // 10MB test verisi
        const testData = new Array(testDataSize).join('0');
        let startTime, endTime;
        
        function startTest() {
            if (testInProgress) return;
            
            testInProgress = true;
            document.getElementById('startTest').disabled = true;
            document.getElementById('progressContainer').style.display = 'block';
            document.getElementById('downloadResult').style.display = 'none';
            document.getElementById('uploadResult').style.display = 'none';
            
            // Önce indirme hızını test et
            testDownloadSpeed()
                .then(downloadSpeed => {
                    document.getElementById('downloadSpeed').textContent = downloadSpeed.toFixed(2);
                    document.getElementById('downloadResult').style.display = 'block';
                    
                    // Sonra yükleme hızını test et
                    return testUploadSpeed();
                })
                .then(uploadSpeed => {
                    document.getElementById('uploadSpeed').textContent = uploadSpeed.toFixed(2);
                    document.getElementById('uploadResult').style.display = 'block';
                })
                .catch(error => {
                    console.error('Hız testi sırasında hata:', error);
                    alert('Hız testi sırasında bir hata oluştu: ' + error.message);
                })
                .finally(() => {
                    testInProgress = false;
                    document.getElementById('startTest').disabled = false;
                    document.getElementById('progressContainer').style.display = 'none';
                    document.getElementById('progressBar').style.width = '0%';
                });
        }
        
        function testDownloadSpeed() {
            return new Promise((resolve) => {
                const testUrl = `https://httpbin.org/bytes/${testDataSize}?r=${Math.random()}`;
                startTime = Date.now();
                
                fetch(testUrl)
                    .then(response => response.blob())
                    .then(() => {
                        endTime = Date.now();
                        const duration = (endTime - startTime) / 1000; // saniye cinsinden
                        const bitsLoaded = testDataSize * 8;
                        const speedMbps = (bitsLoaded / duration) / (1024 * 1024);
                        resolve(speedMbps);
                    });
                
                // İlerleme çubuğu güncelleme
                const progressInterval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const progress = Math.min(50, (elapsed / 3000) * 50); // Max 3 saniye için %50
                    document.getElementById('progressBar').style.width = `${progress}%`;
                }, 100);
                
                setTimeout(() => clearInterval(progressInterval), 3000);
            });
        }
        
        function testUploadSpeed() {
            return new Promise((resolve) => {
                const testUrl = 'https://httpbin.org/post';
                const formData = new FormData();
                formData.append('data', new Blob([testData], { type: 'application/octet-stream' }));
                
                startTime = Date.now();
                
                fetch(testUrl, {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(() => {
                    endTime = Date.now();
                    const duration = (endTime - startTime) / 1000; // saniye cinsinden
                    const bitsLoaded = testDataSize * 8;
                    const speedMbps = (bitsLoaded / duration) / (1024 * 1024);
                    resolve(speedMbps);
                });
                
                // İlerleme çubuğu güncelleme
                const progressInterval = setInterval(() => {
                    const elapsed = Date.now() - startTime;
                    const progress = 50 + Math.min(50, (elapsed / 3000) * 50); // Max 3 saniye için %50-100
                    document.getElementById('progressBar').style.width = `${progress}%`;
                }, 100);
                
                setTimeout(() => clearInterval(progressInterval), 3000);
            });
        }
    </script>
</body>
</html>
