<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no, user-scalable=no" />
<meta charset="UTF-8" />
<title>Tek Dosya Hız Testi</title>
<style type="text/css">
    html,body{
        border:none; padding:0; margin:0;
        background:#FFFFFF;
        color:#202020;
    }
    body{
        text-align:center;
        font-family:Arial, sans-serif;
    }
    h1{
        color:#404040;
    }
    #loading{
        background-color:#FFFFFF;
        color:#404040;
        text-align:center;
    }
    span.loadCircle{
        display:inline-block;
        width:2em;
        height:2em;
        vertical-align:middle;
        border:0.3em solid #4040FF;
        border-right-color:transparent;
        border-radius:50%;
        margin-right:0.5em;
        animation: spin 0.6s linear infinite;
    }
    @keyframes spin{
        0%{transform:rotate(0deg);}
        100%{transform:rotate(359deg);}
    }
    #startStopBtn{
        display:inline-block;
        margin:0 auto;
        color:#6060AA;
        background-color:rgba(0,0,0,0);
        border:0.15em solid #6060FF;
        border-radius:0.3em;
        transition:all 0.3s;
        box-sizing:border-box;
        width:8em; height:3em;
        line-height:2.7em;
        cursor:pointer;
        box-shadow: 0 0 0 rgba(0,0,0,0.1), inset 0 0 0 rgba(0,0,0,0.1);
    }
    #startStopBtn:hover{
        box-shadow: 0 0 2em rgba(0,0,0,0.1), inset 0 0 1em rgba(0,0,0,0.1);
    }
    #startStopBtn.running{
        background-color:#FF3030;
        border-color:#FF6060;
        color:#FFFFFF;
    }
    #startStopBtn:before{
        content:"Başlat";
    }
    #startStopBtn.running:before{
        content:"Durdur";
    }
    #test{
        margin-top:2em;
        margin-bottom:12em;
    }
    div.testArea{
        display:inline-block;
        width:16em;
        height:12.5em;
        position:relative;
        box-sizing:border-box;
    }
    div.testArea2{
        display:inline-block;
        width:14em;
        height:7em;
        position:relative;
        box-sizing:border-box;
        text-align:center;
    }
    div.testArea div.testName{
        position:absolute;
        top:0.1em; left:0;
        width:100%;
        font-size:1.4em;
        z-index:9;
    }
    div.testArea2 div.testName{
        display:block;
        text-align:center;
        font-size:1.4em;
    }
    div.testArea div.meterText{
        position:absolute;
        bottom:1.55em; left:0;
        width:100%;
        font-size:2.5em;
        z-index:9;
    }
    div.testArea2 div.meterText{
        display:inline-block;
        font-size:2.5em;
    }
    div.meterText:empty:before{
        content:"0.00";
    }
    div.testArea div.unit{
        position:absolute;
        bottom:2em; left:0;
        width:100%;
        z-index:9;
    }
    div.testArea2 div.unit{
        display:inline-block;
    }
    div.testArea canvas{
        position:absolute;
        top:0; left:0; width:100%; height:100%;
        z-index:1;
    }
    div.testGroup{
        display:block;
        margin: 0 auto;
    }
    #ip{
        margin-top: 1em;
        margin-bottom: 1em;
    }
    div.visible{
        animation: fadeIn 0.4s;
        display:block;
    }
    div.hidden{
        animation: fadeOut 0.4s;
        display:none;
    }
    @keyframes fadeIn{
        0%{
            opacity:0;
        }
        100%{
            opacity:1;
        }
    }
    @keyframes fadeOut{
        0%{
            display:block;
            opacity:1;
        }
        100%{
            display:block;
            opacity:0;
        }
    }
    @media all and (max-width:40em){
        body{
            font-size:0.8em;
        }
    }
    @media all and (prefers-color-scheme: dark){
        html,body,#loading{
            background:#202020;
            color:#F4F4F4;
            color-scheme:dark;
        }
        h1{
            color:#E0E0E0;
        }
    }
</style>
<script type="text/javascript">
// Basitleştirilmiş JavaScript Hız Test Uygulaması

// DOM eleman seçici
function I(id){return document.getElementById(id);}

// Hız testini gerçekleştiren sınıf
class Speedtest {
    constructor() {
        this.state = 0; // 0=ready, 1=ping/jitter, 2=download, 3=upload, 4=finished
        this.dlStatus = 0;
        this.ulStatus = 0;
        this.pingStatus = 0;
        this.jitterStatus = 0;
        this.callbackFunction = null;
        this.dlProgress = 0;
        this.ulProgress = 0;
        this.clientIp = "";
    }

    // Testleri başlat
    start() {
        this.state = 1;
        this.dlStatus = 0;
        this.ulStatus = 0;
        this.pingStatus = 0;
        this.jitterStatus = 0;
        this.dlProgress = 0;
        this.ulProgress = 0;
        this.getIP();
        this.startTest();
    }

    // Testi durdur
    abort() {
        this.state = 4;
        if(typeof this.onend === "function") this.onend(true);
    }

    // Durum bilgisini döndür
    getState() {
        return this.state;
    }

    // IP adresini al (simulasyon)
    getIP() {
        // Gerçek bir testte burada AJAX ile IP alınırdı
        setTimeout(() => {
            this.clientIp = "192.168.1." + Math.floor(Math.random() * 256);
            this.update();
        }, 500);
    }

    // Test verilerini güncelle
    update() {
        if(typeof this.onupdate === "function") {
            this.onupdate({
                dlStatus: this.dlStatus,
                ulStatus: this.ulStatus,
                pingStatus: this.pingStatus,
                jitterStatus: this.jitterStatus,
                dlProgress: this.dlProgress,
                ulProgress: this.ulProgress,
                testState: this.state,
                clientIp: this.clientIp
            });
        }
    }

    // Tüm testleri sırayla başlat
    startTest() {
        // Test iptal edilmişse durdur
        if(this.state === 4) return;

        // Ping ve jitter testi
        this.performPingJitterTest(() => {
            if(this.state === 4) return;
            this.state = 2;
            this.update();
            
            // İndirme testi
            this.performDownloadTest(() => {
                if(this.state === 4) return;
                this.state = 3;
                this.update();
                
                // Yükleme testi
                this.performUploadTest(() => {
                    this.state = 4;
                    this.update();
                    if(typeof this.onend === "function") this.onend(false);
                });
            });
        });
    }

    // Ping ve jitter testi (simulasyon)
    performPingJitterTest(callback) {
        let pingSum = 0;
        let jitterSum = 0;
        let pingValues = [];
        let iteration = 0;
        let maxIterations = 10;
        
        const doPing = () => {
            if(this.state === 4) { // İptal edildi mi kontrol et
                callback();
                return;
            }
            
            setTimeout(() => {
                // Gerçek bir ping değeri yerine 20-80ms arasında rastgele değer
                let currentPing = 20 + Math.random() * 60;
                pingValues.push(currentPing);
                pingSum += currentPing;
                
                // Jitter hesapla (ardışık ping değerleri arasındaki fark)
                if(pingValues.length > 1) {
                    jitterSum += Math.abs(pingValues[pingValues.length-1] - pingValues[pingValues.length-2]);
                }
                
                // Ortalama ping ve jitter değerlerini güncelle
                this.pingStatus = pingSum / pingValues.length;
                if(pingValues.length > 1)
                    this.jitterStatus = jitterSum / (pingValues.length - 1);
                
                iteration++;
                this.update();
                
                if(iteration < maxIterations) {
                    doPing();
                } else {
                    callback();
                }
            }, 100);
        };
        
        doPing();
    }

    // İndirme testi (simulasyon)
    performDownloadTest(callback) {
        let totalIterations = 15;
        let currentIteration = 0;
        let maxSpeed = 100 + Math.random() * 200; // 100-300 Mbps arası maksimum hız
        
        const simulateDownload = () => {
            if(this.state === 4) { // İptal edildi mi kontrol et
                callback();
                return;
            }
            
            currentIteration++;
            this.dlProgress = currentIteration / totalIterations;
            
            // Simüle edilmiş indirme hızı, her adımda artar
            let progress = currentIteration / totalIterations;
            // Gerçekçi bir artış eğrisi için sigmoid fonksiyonu kullanıyoruz
            let sigmoid = 1 / (1 + Math.exp(-12 * (progress - 0.5)));
            this.dlStatus = maxSpeed * sigmoid;
            
            this.update();
            
            if(currentIteration < totalIterations) {
                setTimeout(simulateDownload, 200);
            } else {
                callback();
            }
        };
        
        simulateDownload();
    }

    // Yükleme testi (simulasyon)
    performUploadTest(callback) {
        let totalIterations = 15;
        let currentIteration = 0;
        let maxSpeed = 50 + Math.random() * 100; // 50-150 Mbps arası maksimum hız
        
        const simulateUpload = () => {
            if(this.state === 4) { // İptal edildi mi kontrol et
                callback();
                return;
            }
            
            currentIteration++;
            this.ulProgress = currentIteration / totalIterations;
            
            // Simüle edilmiş yükleme hızı, her adımda artar
            let progress = currentIteration / totalIterations;
            // Gerçekçi bir artış eğrisi için sigmoid fonksiyonu kullanıyoruz
            let sigmoid = 1 / (1 + Math.exp(-12 * (progress - 0.5)));
            this.ulStatus = maxSpeed * sigmoid;
            
            this.update();
            
            if(currentIteration < totalIterations) {
                setTimeout(simulateUpload, 200);
            } else {
                callback();
            }
        };
        
        simulateUpload();
    }
}

var meterBk = "#80808040";
var dlColor = "#6060AA";
var ulColor = "#616161";
var progColor = meterBk;

// Gösterge çizimi için fonksiyonlar
function drawMeter(c, amount, bk, fg, progress, prog) {
    var ctx = c.getContext("2d");
    var dp = window.devicePixelRatio || 1;
    var cw = c.clientWidth * dp, ch = c.clientHeight * dp;
    var sizScale = ch * 0.0055;
    
    if(c.width == cw && c.height == ch) {
        ctx.clearRect(0, 0, cw, ch);
    } else {
        c.width = cw;
        c.height = ch;
    }
    
    ctx.beginPath();
    ctx.strokeStyle = bk;
    ctx.lineWidth = 12 * sizScale;
    ctx.arc(c.width/2, c.height-58*sizScale, c.height/1.8-ctx.lineWidth, -Math.PI*1.1, Math.PI*0.1);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.strokeStyle = fg;
    ctx.lineWidth = 12 * sizScale;
    ctx.arc(c.width/2, c.height-58*sizScale, c.height/1.8-ctx.lineWidth, -Math.PI*1.1, amount*Math.PI*1.2-Math.PI*1.1);
    ctx.stroke();
    
    if(typeof progress !== "undefined") {
        ctx.fillStyle = prog;
        ctx.fillRect(c.width*0.3, c.height-16*sizScale, c.width*0.4*progress, 4*sizScale);
    }
}

function mbpsToAmount(s) {
    return 1 - (1 / (Math.pow(1.3, Math.sqrt(s))));
}

function format(d) {
    d = Number(d);
    if(d < 10) return d.toFixed(2);
    if(d < 100) return d.toFixed(1);
    return d.toFixed(0);
}

// Hız testi nesnesi
var s = new Speedtest();

// UI verisi
var uiData = null;

// Başlat/Durdur butonuna tıklama
function startStop() {
    if(s.getState() == 3 || s.getState() == 2 || s.getState() == 1) { // test çalışıyor, durdur
        s.abort();
        data = null;
        I("startStopBtn").className = "";
        initUI();
    } else { // test çalışmıyor, başlat
        I("startStopBtn").className = "running";
        s.onupdate = function(data) {
            uiData = data;
        };
        s.onend = function(aborted) {
            I("startStopBtn").className = "";
            updateUI(true);
        };
        s.start();
    }
}

// UI'yi güncellemek için fonksiyon
function updateUI(forced) {
    if(!forced && s.getState() != 3) return;
    if(uiData == null) return;
    
    var status = uiData.testState;
    I("ip").textContent = "IP: " + uiData.clientIp;
    
    I("dlText").textContent = (status == 1 && uiData.dlStatus == 0) ? "..." : format(uiData.dlStatus);
    drawMeter(I("dlMeter"), mbpsToAmount(Number(uiData.dlStatus * (status == 1 ? oscillate() : 1))), meterBk, dlColor, Number(uiData.dlProgress), progColor);
    
    I("ulText").textContent = (status == 3 && uiData.ulStatus == 0) ? "..." : format(uiData.ulStatus);
    drawMeter(I("ulMeter"), mbpsToAmount(Number(uiData.ulStatus * (status == 3 ? oscillate() : 1))), meterBk, ulColor, Number(uiData.ulProgress), progColor);
    
    I("pingText").textContent = format(uiData.pingStatus);
    I("jitText").textContent = format(uiData.jitterStatus);
}

function oscillate() {
    return 1 + 0.02 * Math.sin(Date.now() / 100);
}

// Her kare UI'yi güncelle
window.requestAnimationFrame = window.requestAnimationFrame || window.webkitRequestAnimationFrame || window.mozRequestAnimationFrame || window.msRequestAnimationFrame || (function(callback, element) { setTimeout(callback, 1000/60); });

function frame() {
    requestAnimationFrame(frame);
    updateUI();
}

// UI'yi başlangıç durumuna getir
function initUI() {
    drawMeter(I("dlMeter"), 0, meterBk, dlColor, 0);
    drawMeter(I("ulMeter"), 0, meterBk, ulColor, 0);
    I("dlText").textContent = "";
    I("ulText").textContent = "";
    I("pingText").textContent = "";
    I("jitText").textContent = "";
    I("ip").textContent = "";
}

window.onload = function() {
    I("loading").className = "hidden";
    I("testWrapper").className = "visible";
    initUI();
    frame();
};
</script>
</head>
<body>
<h1>Hız Testi</h1>
<div id="loading" class="visible">
    <p id="message"><span class="loadCircle"></span>Yükleniyor...</p>
</div>
<div id="testWrapper" class="hidden">
    <div id="startStopBtn" onclick="startStop()"></div>
    <div id="test">
        <div class="testGroup">
            <div class="testArea2">
                <div class="testName">Ping</div>
                <div id="pingText" class="meterText" style="color:#AA6060"></div>
                <div class="unit">ms</div>
            </div>
            <div class="testArea2">
                <div class="testName">Jitter</div>
                <div id="jitText" class="meterText" style="color:#AA6060"></div>
                <div class="unit">ms</div>
            </div>
        </div>
        <div class="testGroup">
            <div class="testArea">
                <div class="testName">İndirme</div>
                <canvas id="dlMeter" class="meter"></canvas>
                <div id="dlText" class="meterText"></div>
                <div class="unit">Mbit/s</div>
            </div>
            <div class="testArea">
                <div class="testName">Yükleme</div>
                <canvas id="ulMeter" class="meter"></canvas>
                <div id="ulText" class="meterText"></div>
                <div class="unit">Mbit/s</div>
            </div>
        </div>
        <div id="ipArea">
            <span id="ip"></span>
        </div>
        <div class="disclaimer" style="margin-top: 3em;">
            <p><small>Not: Bu tek dosyalı hız testi, gerçek internet bağlantınızı test etmez. Sadece simülasyon amaçlı tasarlanmıştır.</small></p>
        </div>
    </div>
</div>
</body>
</html>
