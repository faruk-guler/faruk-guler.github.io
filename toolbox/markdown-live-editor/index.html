<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown Live Editor -farukguler.com</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            background: #f5f5f5;
        }
        
        .header {
            height: 60px;
            background: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .clear-btn:hover {
            background: #c0392b;
        }
        
        .main {
            height: calc(100vh - 60px);
            display: grid;
            grid-template-columns: 1fr 5px 1fr;
        }
        
        .editor-panel {
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .preview-panel {
            background: white;
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            height: 40px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
            color: #333;
        }
        
        .editor {
            flex: 1;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        
        .preview {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }
        
        .resizer {
            background: #ddd;
            cursor: col-resize;
            position: relative;
            transition: background 0.2s;
        }
        
        .resizer:hover {
            background: #bbb;
        }
        
        .resizer::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 2px;
            height: 30px;
            background: #999;
            border-radius: 1px;
        }
        
        .preview h1, .preview h2, .preview h3 {
            color: #333;
            margin: 20px 0 10px 0;
        }
        
        .preview p {
            margin: 10px 0;
            line-height: 1.6;
        }
        
        .preview code {
            background: #f4f4f4;
            padding: 2px 4px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .preview pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            margin: 10px 0;
        }
        
        .preview blockquote {
            border-left: 4px solid #3498db;
            margin: 15px 0;
            padding: 10px 15px;
            background: #f8f9fa;
            color: #555;
        }
        
        .preview ul, .preview ol {
            margin: 10px 0 10px 20px;
        }
        
        .preview li {
            margin: 5px 0;
        }
        
        .preview a {
            color: #3498db;
            text-decoration: none;
        }
        
        .preview a:hover {
            text-decoration: underline;
        }
        
        .preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 15px 0;
        }
        
        .preview th, .preview td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        
        .preview th {
            background: #f8f9fa;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Markdown Live Editor -farukguler.com</h1>
        <button class="clear-btn" onclick="clearEditor()">Clear</button>
    </div>
    
    <div class="main">
        <div class="editor-panel">
            <div class="panel-header">Editor</div>
            <textarea class="editor" id="editor" placeholder="Type markdown here..."></textarea>
        </div>
        
        <div class="resizer" onmousedown="startResize(event)"></div>
        
        <div class="preview-panel">
            <div class="panel-header">Preview</div>
            <div class="preview" id="preview">
                <div class="placeholder">Preview will appear here...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const main = document.querySelector('.main');
        
        let isResizing = false;
        
        editor.addEventListener('input', updatePreview);
        
        function updatePreview() {
            const text = editor.value;
            if (text.trim() === '') {
                preview.innerHTML = '<div class="placeholder">Preview will appear here...</div>';
            } else {
                preview.innerHTML = marked.parse(text);
            }
        }
        
        function clearEditor() {
            if (editor.value.trim() !== '' && !confirm('Clear all content?')) {
                return;
            }
            editor.value = '';
            updatePreview();
            editor.focus();
        }
        
        function startResize(e) {
            isResizing = true;
            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        }
        
        function doResize(e) {
            if (!isResizing) return;
            
            const rect = main.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const percent = (x / rect.width) * 100;
            
            if (percent > 20 && percent < 80) {
                main.style.gridTemplateColumns = `${percent}% 5px ${100-percent}%`;
            }
        }
        
        function stopResize() {
            isResizing = false;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        }
        
        // Keyboard shortcuts
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(end);
                editor.selectionStart = editor.selectionEnd = start + 4;
                updatePreview();
            }
        });
        
        // Prevent text selection during resize
        document.addEventListener('selectstart', function(e) {
            if (isResizing) e.preventDefault();
        });
        
        updatePreview();
    </script>
</body>
</html>
