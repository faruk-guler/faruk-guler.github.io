name: Update llms.txt

# Trigger when a new post is pushed to main/master
on:
  push:
    branches:
      - main
      - master
    paths:
      - "_posts/**"                  # runs when a post is added/changed
      - "scripts/generate_llms.py"   # or when the script itself changes

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  update-llms:
    name: Regenerate llms.txt and llms-full.txt
    runs-on: ubuntu-latest

    # Required so the job can push back to the repo
    permissions:
      contents: write

    steps:
      # 1. Checkout the full repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml --quiet

      # 3. Run the generator
      - name: Generate llms.txt and llms-full.txt
        run: python3 scripts/generate_llms.py

      # 4. Commit & push only if something changed
      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add llms.txt llms-full.txt

          if git diff --cached --quiet; then
            echo "No changes detected — skipping commit."
          else
            git commit -m "chore: auto-update llms.txt [skip ci]"
            git push
            echo "✓ Pushed updated llms.txt and llms-full.txt."
          fi
